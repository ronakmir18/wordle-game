<!DOCTYPE html>
<html>
<head>
  <title>Office Word Hunt</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      text-align: center;
      margin: 0;
    }

    .container {
      width: 95%;
      max-width: 520px;
      margin: 15px auto;
      background: white;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      padding: 8px;
      width: 80%;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 10px 0;
    }

    /* 🔥 12x12 GRID FIX */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px;
      margin-top: 15px;
      touch-action: none;
    }

    .cell {
      aspect-ratio: 1;
      background: #f1f3f5;
      border-radius: 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .selected { background: #ffd43b; }
    .found { background: #40c057; color: white; }

    .word {
      display: inline-block;
      padding: 5px 8px;
      margin: 4px;
      border-radius: 6px;
      background: #eee;
      font-size: 12px;
    }

    .done {
      background: #40c057;
      color: white;
      text-decoration: line-through;
    }

    li {
      list-style: none;
      background: #f1f3f5;
      margin: 4px;
      padding: 6px;
      border-radius: 8px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="container">

<h2>🧩 Word Hunt</h2>

<input id="playerName" placeholder="Enter your name">

<div id="wordList"></div>

<div class="grid" id="grid"></div>

<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>

</div>

<script>
const words = [
  "DATA","NINJA","CLIX",
  "HYGIENE","FIELD","CLOUD","SERVER",
  "NETWORK","SECURITY"
];

let foundWords = [];

const gridLetters = [
["H","Y","G","I","E","N","E","Q","A","P","S","T"],
["A","N","E","T","K","O","R","K","L","D","Y","U"],
["T","C","E","U","D","X","Y","I","A","A","S","Y"],
["X","L","L","T","N","J","A","E","N","T","E","T"],
["D","C","E","L","W","P","Q","L","A","A","R","I"],
["S","L","R","V","E","O","W","D","L","C","V","R"],
["Z","O","C","U","I","X","R","E","Y","S","E","C"],
["A","U","I","K","A","T","A","K","T","S","R","E"],
["J","D","C","U","R","I","T","Y","M","Y","T","S"],
["N","N","C","L","I","X","I","C","S","X","Y","D"],
["I","W","E","R","T","Y","U","I","O","P","L","K"],
["N","N","B","V","C","X","A","T","A","D","F","G"]
];

let selectedCells = [];
let isDragging = false;
let startTime = Date.now();

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwftOP6ih5Meavls36tvfLwa7ttxGz1A9oF_gf-L2lcXLy-g0KPZDyS2JG2nr3XJz4ZCw/exec";

function createGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  gridLetters.forEach(row => {
    row.forEach(letter => {
      const div = document.createElement("div");
      div.className = "cell";
      div.innerText = letter;

      div.onmousedown = () => startSelection(div);
      div.onmouseover = () => dragSelection(div);
      div.onmouseup = endSelection;

      div.ontouchstart = (e) => {
        e.preventDefault();
        startSelection(div);
      };

      div.ontouchmove = (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if (el && el.classList.contains("cell")) dragSelection(el);
      };

      div.ontouchend = endSelection;

      grid.appendChild(div);
    });
  });
}

function startSelection(cell) {
  isDragging = true;
  selectedCells = [];
  selectCell(cell);
}

function dragSelection(cell) {
  if (isDragging) selectCell(cell);
}

function selectCell(cell) {
  if (!selectedCells.includes(cell)) {
    selectedCells.push(cell);
    cell.classList.add("selected");
  }
}

function endSelection() {
  isDragging = false;

  let word = selectedCells.map(c => c.innerText).join("");
  let reverse = word.split("").reverse().join("");

  if ((words.includes(word) || words.includes(reverse)) &&
      !foundWords.includes(word) && !foundWords.includes(reverse)) {

    selectedCells.forEach(c => {
      c.classList.remove("selected");
      c.classList.add("found");
    });

    if (words.includes(word)) foundWords.push(word);
    if (words.includes(reverse)) foundWords.push(reverse);

    updateWordList();
  } else {
    selectedCells.forEach(c => c.classList.remove("selected"));
  }

  selectedCells = [];

  if (foundWords.length === words.length) {
    let timeTaken = ((Date.now() - startTime) / 1000).toFixed(2);
    saveScore(timeTaken);
  }
}

function updateWordList() {
  const list = document.getElementById("wordList");
  list.innerHTML = "";

  words.forEach(w => {
    const div = document.createElement("div");
    div.className = "word";
    if (foundWords.includes(w)) div.classList.add("done");
    div.innerText = w;
    list.appendChild(div);
  });
}

function saveScore(time) {
  const name = document.getElementById("playerName").value.trim();
  if (!name) return alert("Enter your name");

  const fd = new FormData();
  fd.append("name", name);
  fd.append("time", time);

  fetch(SCRIPT_URL, { method: "POST", body: fd })
    .then(() => loadLeaderboard());
}

function loadLeaderboard() {
  fetch(SCRIPT_URL)
    .then(res => res.json())
    .then(data => {
      data.sort((a,b)=>a.time-b.time);

      const board = document.getElementById("leaderboard");
      board.innerHTML = "";

      data.forEach(s => {
        const li = document.createElement("li");
        li.innerText = `${s.name} — ${s.time}s`;
        board.appendChild(li);
      });
    });
}

createGrid();
updateWordList();
loadLeaderboard();
</script>

</body>
</html>
