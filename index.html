<!DOCTYPE html>
<html>
<head>
  <title>Office Word Hunt</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      text-align: center;
      margin: 0;
    }

    .container {
      width: 95%;
      max-width: 520px;
      margin: 15px auto;
      background: white;
      padding: 15px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      padding: 8px;
      width: 80%;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin: 10px 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px;
      margin-top: 15px;
      touch-action: none;
    }

    .cell {
      aspect-ratio: 1;
      background: #f1f3f5;
      border-radius: 8px;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .selected { background: #ffd43b; }
    .found { background: #40c057; color: white; }

    .word {
      display: inline-block;
      padding: 5px 8px;
      margin: 4px;
      border-radius: 6px;
      background: #eee;
      font-size: 12px;
    }

    .done {
      background: #40c057;
      color: white;
      text-decoration: line-through;
    }

    li {
      list-style: none;
      background: #f1f3f5;
      margin: 4px;
      padding: 6px;
      border-radius: 8px;
      font-size: 12px;
    }

    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .popup-overlay.show {
      display: flex;
    }

    .popup-box {
      background: white;
      border-radius: 16px;
      padding: 30px 24px;
      max-width: 300px;
      width: 90%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .popup-box h2 { margin: 0 0 8px; font-size: 22px; }
    .popup-box p { color: #555; font-size: 14px; margin: 0 0 20px; }

    .popup-box button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .popup-box button:hover { background: #764ba2; }
  </style>
</head>

<body>

<div class="container">
  <h2>🧩 Word Hunt</h2>
  <input id="playerName" placeholder="Enter your name">
  <div id="wordList"></div>
  <div class="grid" id="grid"></div>
  <h3>🏆 Leaderboard</h3>
  <ul id="leaderboard"></ul>
</div>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <h2>🎉 Nice work!</h2>
    <p id="popupMessage"></p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
const words = [
  "BUREAU", "CREDIT", "DISBURSAL", "VINTAGE", "SCORECARD", "EXPOSURE"
];
let foundWords = [];
const gridLetters = [
  ["D","I","S","B","U","R","S","A","L","P","R","T"],
  ["A","E","T","K","O","R","E","K","L","I","Y","Y"],
  ["T","X","P","O","S","U","R","E","E","A","S","E"],
  ["X","L","B","T","N","J","A","L","N","T","K","R"],
  ["V","C","E","U","W","P","D","R","A","A","R","U"],
  ["I","L","R","V","R","O","A","D","C","C","U","S"],
  ["N","S","C","U","I","E","C","E","Y","S","E","O"],
  ["T","U","I","K","A","T","A","E","T","S","R","P"],
  ["A","D","C","U","R","I","O","U","M","Y","T","X"],
  ["G","B","X","R","E","A","U","I","C","S","Y","E"],
  ["E","W","D","R","A","C","E","R","O","C","S","K"],
  ["S","V","O","R","E","C","T","I","D","E","R","C"]
];

let selectedCells = [];
let isDragging = false;
let startTime = Date.now();

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwftOP6ih5Meavls36tvfLwa7ttxGz1A9oF_gf-L2lcXLy-g0KPZDyS2JG2nr3XJz4ZCw/exec";

function showPopup(name, time) {
  document.getElementById("popupMessage").innerText =
    `✅ Entry recorded for ${name}! You completed it in ${time}s. Check the leaderboard to see where you stand!`;
  document.getElementById("popupOverlay").classList.add("show");
}

function closePopup() {
  document.getElementById("popupOverlay").classList.remove("show");
}

function createGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  gridLetters.forEach(row => {
    row.forEach(letter => {
      const div = document.createElement("div");
      div.className = "cell";
      div.innerText = letter;

      div.onmousedown = () => startSelection(div);
      div.onmouseover = () => dragSelection(div);
      div.onmouseup = endSelection;

      div.ontouchstart = (e) => {
        e.preventDefault();
        startSelection(div);
      };

      div.ontouchmove = (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const el = document.elementFromPoint(t.clientX, t.clientY);
        if (el && el.classList.contains("cell")) dragSelection(el);
      };

      div.ontouchend = endSelection;

      grid.appendChild(div);
    });
  });
}

function startSelection(cell) {
  isDragging = true;
  selectedCells = [];
  selectCell(cell);
}

function dragSelection(cell) {
  if (isDragging) selectCell(cell);
}

function selectCell(cell) {
  if (!selectedCells.includes(cell)) {
    selectedCells.push(cell);
    cell.classList.add("selected");
  }
}

function endSelection() {
  isDragging = false;

  let word = selectedCells.map(c => c.innerText).join("");
  let reverse = word.split("").reverse().join("");

  if ((words.includes(word) || words.includes(reverse)) &&
      !foundWords.includes(word) && !foundWords.includes(reverse)) {

    selectedCells.forEach(c => {
      c.classList.remove("selected");
      c.classList.add("found");
    });

    if (words.includes(word)) foundWords.push(word);
    if (words.includes(reverse)) foundWords.push(reverse);

    updateWordList();
  } else {
    selectedCells.forEach(c => c.classList.remove("selected"));
  }

  selectedCells = [];

  if (foundWords.length === words.length) {
    let timeTaken = ((Date.now() - startTime) / 1000).toFixed(2);
    saveScore(timeTaken);
  }
}

function updateWordList() {
  const list = document.getElementById("wordList");
  list.innerHTML = "";

  words.forEach(w => {
    const div = document.createElement("div");
    div.className = "word";
    if (foundWords.includes(w)) div.classList.add("done");
    div.innerText = w;
    list.appendChild(div);
  });
}

function saveScore(time) {
  const name = document.getElementById("playerName").value.trim();
  if (!name) return alert("Enter your name first!");

  const fd = new FormData();
  fd.append("name", name);
  fd.append("time", time);

  fetch(SCRIPT_URL, { method: "POST", body: fd })
    .then(() => {
      showPopup(name, time);
      loadLeaderboard();
    });
}

function loadLeaderboard() {
  fetch(SCRIPT_URL)
    .then(res => res.json())
    .then(data => {
      data.sort((a,b) => a.time - b.time);
      const board = document.getElementById("leaderboard");
      board.innerHTML = "";
      data.forEach(s => {
        const li = document.createElement("li");
        li.innerText = `${s.name} — ${s.time}s`;
        board.appendChild(li);
      });
    });
}

createGrid();
updateWordList();
loadLeaderboard();
</script>

</body>
</html>
