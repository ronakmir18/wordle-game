<!DOCTYPE html>
<html>
<head>
  <title>Office Word Hunt</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      text-align: center;
      margin: 0;
    }

    .container {
      background: white;
      width: 520px;
      margin: 40px auto;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 45px);
      gap: 6px;
      justify-content: center;
      margin-top: 20px;
    }

    .cell {
      width: 45px;
      height: 45px;
      background: #f1f3f5;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
    }

    .selected { background: #ffd43b; }
    .found { background: #40c057; color: white; }

    .word {
      display: inline-block;
      margin: 5px;
      padding: 6px 10px;
      background: #eee;
      border-radius: 6px;
    }

    .done {
      background: #40c057;
      color: white;
      text-decoration: line-through;
    }
  </style>
</head>

<body>

<div class="container">
<h1>🧩 Office Word Hunt</h1>

<h3>Find these words:</h3>
<div id="wordList"></div>

<div class="grid" id="grid"></div>
</div>

<script>
const words = ["DATA", "NINJA", "CLIX", "LOGIC", "PIXEL"];

let foundWords = [];

/* 10x10 GRID (words placed in different directions) */
const gridLetters = [
["D","A","T","A","X","Q","L","M","N","O"], // DATA →
["B","C","D","E","F","G","H","I","J","K"],
["N","I","N","J","A","P","Q","R","S","T"], // NINJA →
["U","V","W","X","Y","Z","A","B","C","D"],
["E","F","G","H","I","J","K","L","M","N"],
["C","L","I","X","O","P","Q","R","S","T"], // CLIX →
["U","V","W","X","Y","Z","A","B","C","D"],
["L","O","G","I","C","E","F","G","H","I"], // LOGIC →
["P","Q","R","S","T","U","V","W","X","Y"],
["P","I","X","E","L","Z","A","B","C","D"]  // PIXEL →
];

let selectedCells = [];
let isDragging = false;

function createGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  gridLetters.forEach((row) => {
    row.forEach((letter) => {
      const div = document.createElement("div");
      div.className = "cell";
      div.innerText = letter;

      div.onmousedown = () => startSelection(div);
      div.onmouseover = () => dragSelection(div);
      div.onmouseup = endSelection;

      grid.appendChild(div);
    });
  });
}

function startSelection(cell) {
  isDragging = true;
  selectedCells = [];
  selectCell(cell);
}

function dragSelection(cell) {
  if (isDragging) selectCell(cell);
}

function selectCell(cell) {
  if (!selectedCells.includes(cell)) {
    selectedCells.push(cell);
    cell.classList.add("selected");
  }
}

function endSelection() {
  isDragging = false;

  let forward = selectedCells.map(c => c.innerText).join("");
  let backward = forward.split("").reverse().join("");

  if ((words.includes(forward) || words.includes(backward)) && 
      !foundWords.includes(forward) && !foundWords.includes(backward)) {

    selectedCells.forEach(c => {
      c.classList.remove("selected");
      c.classList.add("found");
    });

    foundWords.push(forward);
    foundWords.push(backward);

    updateWordList();
  } else {
    selectedCells.forEach(c => c.classList.remove("selected"));
  }

  selectedCells = [];
}

function updateWordList() {
  const list = document.getElementById("wordList");
  list.innerHTML = "";

  words.forEach(w => {
    const div = document.createElement("div");
    div.className = "word";
    if (foundWords.includes(w)) div.classList.add("done");
    div.innerText = w;
    list.appendChild(div);
  });
}

createGrid();
updateWordList();
</script>

</body>
</html>
