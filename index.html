<!DOCTYPE html>
<html>
<head>
  <title>Office Word Hunt</title>
  <style>
    body { font-family: Arial; text-align: center; background: #f5f5f5; }
    input, button { padding: 10px; margin: 5px; }
    .word { display: inline-block; margin: 5px; padding: 10px; border: 1px solid black; background: white; }
  </style>
</head>

<body>

<h1>🧩 Office Word Hunt</h1>

<input id="name" placeholder="Enter your name"><br>
<input id="guess" placeholder="Enter guess">
<button onclick="submitGuess()">Submit</button>

<h3>Words Left:</h3>
<div id="words"></div>

<h3>🏆 Leaderboard</h3>
<ul id="leaderboard"></ul>

<script>
let words = ["data", "ninja", "clix"];
let startTime = Date.now();
let attempts = 0;

function renderWords() {
  let container = document.getElementById("words");
  container.innerHTML = "";
  words.forEach(word => {
    let div = document.createElement("div");
    div.className = "word";
    div.innerText = word;
    container.appendChild(div);
  });
}

function submitGuess() {
  let guess = document.getElementById("guess").value.toLowerCase();
  let name = document.getElementById("name").value;

  if (!name) {
    alert("Enter your name first!");
    return;
  }

  attempts++;

  let index = words.indexOf(guess);

  if (index !== -1) {
    words.splice(index, 1);
    alert("✅ Correct!");
    renderWords();
  } else {
    alert("❌ Wrong!");
  }

  document.getElementById("guess").value = "";

  if (words.length === 0) {
    let timeTaken = ((Date.now() - startTime) / 1000).toFixed(2);
    alert(`🎉 Done in ${timeTaken}s with ${attempts} attempts`);

    saveScore(name, timeTaken, attempts);
    showLeaderboard();
  }
}

function saveScore(name, time, attempts) {
  let scores = JSON.parse(localStorage.getItem("scores")) || [];
  scores.push({ name, time, attempts });
  localStorage.setItem("scores", JSON.stringify(scores));
}

function showLeaderboard() {
  let scores = JSON.parse(localStorage.getItem("scores")) || [];
  scores.sort((a, b) => a.time - b.time);

  let board = document.getElementById("leaderboard");
  board.innerHTML = "";

  scores.forEach(s => {
    let li = document.createElement("li");
    li.innerText = `${s.name} - ${s.time}s (${s.attempts} tries)`;
    board.appendChild(li);
  });
}

renderWords();
showLeaderboard();
</script>

</body>
</html>
