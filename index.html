<!DOCTYPE html>
<html>
<head>
  <title>Word Hunt</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 50px);
      gap: 5px;
      justify-content: center;
      margin: 20px;
    }
    .cell {
      width: 50px;
      height: 50px;
      border: 1px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      user-select: none;
    }
    .selected { background-color: yellow; }
    .found { background-color: lightgreen; }
  </style>
</head>

<body>

<h1>🧩 Word Hunt</h1>

<h3>Find these words:</h3>
<div id="wordList"></div>

<div class="grid" id="grid"></div>

<script>
const words = ["DATA", "NINJA", "CLIX"];
let foundWords = [];

const gridLetters = [
  ["D","A","T","A","X","Z"],
  ["N","I","N","J","A","Q"],
  ["C","L","I","X","M","P"],
  ["R","T","Y","U","I","O"],
  ["S","D","F","G","H","J"],
  ["K","L","Z","X","C","V"]
];

let selectedCells = [];
let isDragging = false;

function createGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  gridLetters.forEach((row, i) => {
    row.forEach((letter, j) => {
      const div = document.createElement("div");
      div.className = "cell";
      div.innerText = letter;

      div.onmousedown = () => startSelection(div);
      div.onmouseover = () => dragSelection(div);
      div.onmouseup = endSelection;

      grid.appendChild(div);
    });
  });
}

function startSelection(cell) {
  isDragging = true;
  selectedCells = [];
  selectCell(cell);
}

function dragSelection(cell) {
  if (isDragging) selectCell(cell);
}

function selectCell(cell) {
  if (!selectedCells.includes(cell)) {
    selectedCells.push(cell);
    cell.classList.add("selected");
  }
}

function endSelection() {
  isDragging = false;

  let word = selectedCells.map(c => c.innerText).join("");

  if (words.includes(word) && !foundWords.includes(word)) {
    selectedCells.forEach(c => {
      c.classList.remove("selected");
      c.classList.add("found");
    });
    foundWords.push(word);
    updateWordList();
  } else {
    selectedCells.forEach(c => c.classList.remove("selected"));
  }

  selectedCells = [];
}

function updateWordList() {
  const list = document.getElementById("wordList");
  list.innerHTML = "";

  words.forEach(w => {
    const div = document.createElement("div");
    div.innerText = foundWords.includes(w) ? `✅ ${w}` : w;
    list.appendChild(div);
  });
}

createGrid();
updateWordList();
</script>

</body>
</html>
